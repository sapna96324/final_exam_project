<script>
const D=[
  {c:"#1864AB",t:"GitHub — Source Control",d:"Hosts the Netflix clone repo. Branch protection, signed commits, PR reviews, and webhook triggers fire Jenkins on every push or merge to main."},
  {c:"#1864AB",t:"DevOps Loop — CI/CD Cycle",d:"Infinity loop of Plan→Code→Build→Test→Release→Deploy→Operate→Monitor. Jenkins drives this autonomously on every commit via Jenkinsfile."},
  {c:"#6741D9",t:"SonarQube — SAST & Quality Gate",d:"Scans source code for SQL injection, XSS, code smells and bugs. Pipeline hard-fails if Quality Gate is not GREEN. SARIF uploaded to GitHub Security tab."},
  {c:"#6741D9",t:"NPM Dependency Check — SCA",d:"SCA audits all npm/Maven packages against NVD CVE database. Generates CycloneDX SBOM every build. Fails on CVSS ≥ 7.0 (High/Critical)."},
  {c:"#6741D9",t:"OWASP — Dep-Check & ZAP DAST",d:"OWASP Dependency-Check finds CVEs in libraries. ZAP runs Dynamic Application Security Testing against the live app to find runtime injection and auth vulnerabilities."},
  {c:"#6741D9",t:"Trivy File Scan — FS / IaC / Secrets",d:"Trivy scans filesystem, Dockerfiles, Helm charts and Terraform plans for OS CVEs, misconfigurations, hardcoded secrets and IaC policy violations."},
  {c:"#2B8A3E",t:"Docker Build — Multi-stage Image",d:"Multi-stage Dockerfile produces a minimal distroless image. BuildKit cache speeds builds. Image signed with Cosign and pushed to Docker Hub / ECR with immutable SHA tag."},
  {c:"#D9480F",t:"Deploy on K8s — Helm & ArgoCD",d:"Helm chart packages the app. ArgoCD GitOps engine reconciles desired state from Git to EKS cluster. Supports Blue/Green and Canary rollouts with auto-rollback on error rate breach."},
  {c:"#D9480F",t:"Deploy Container — Docker / ECS",d:"Deploys signed image to Docker Compose (dev/staging) or AWS ECS (pre-prod). Secrets injected via AWS Secrets Manager — never baked into the image."},
  {c:"#0B7285",t:"Monitoring — Observability Stack",d:"Prometheus scrapes metrics, Grafana visualises SLOs and security dashboards, ELK centralises all logs including K8s audit logs and WAF events. Alertmanager routes on-call pages."},
  {c:"#0B7285",t:"Notify / Mail — Alerts & Comms",d:"Jenkins notifies Slack #devsecops-builds and #security-alerts on every build result. PagerDuty escalates P1 incidents. Post-deploy email reports generated automatically."},
  {c:"#2B8A3E",t:"Image Scan — Trivy & Docker Scout",d:"Scans the final built Docker image for OS package CVEs and app-layer vulnerabilities. Docker Scout generates SBOM attached to the OCI image digest for supply chain auditing."},
];
function show(i){
