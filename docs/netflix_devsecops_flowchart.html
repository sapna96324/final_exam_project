
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif}
.wrap{padding:.5rem 0 2rem;background:transparent}

/* header */
.hdr{display:flex;align-items:center;gap:12px;margin-bottom:1.2rem}
.nfbadge{background:#E50914;border-radius:8px;padding:7px 16px}
.nfbadge span{font-size:18px;font-weight:900;color:#fff;letter-spacing:3px}
.hdr-text h2{font-size:14px;font-weight:700;color:var(--color-text-primary)}

/* legend */
.leg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem}
.li{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--color-text-secondary)}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* detail bar */
.dbar{margin-top:1rem;background:var(--color-background-secondary);border-radius:10px;padding:10px 14px;display:flex;align-items:flex-start;gap:10px;min-height:52px}
.ddot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:3px}
.dtitle{font-size:13px;font-weight:700;color:var(--color-text-primary)}
.ddesc{font-size:11px;color:var(--color-text-secondary);margin-top:2px;line-height:1.5}
</style>

<script>
const D=[
  {c:"#1864AB",t:"01 — Developers",d:"React frontend + NodeJS backend form the Netflix clone. Developers write code locally, open Pull Requests on feature branches. All commits require GPG signing. Branch protection blocks direct pushes to main."},
  {c:"#1864AB",t:"02 — GitHub Repository",d:"Central source of truth. Branch protection rules enforce 2-reviewer PRs. Webhooks fire Jenkins on every push or merge. .gitignore + git-secrets prevent accidental credential commits."},
  {c:"#E67700",t:"03 — Jenkins Pipeline",d:"Declarative Jenkinsfile orchestrates all stages. Parallel stage blocks run security scans simultaneously. Credentials stored in Jenkins Credentials Store — never in code. Blue Ocean UI for pipeline visibility."},
  {c:"#6741D9",t:"04a — SonarQube SAST",d:"Static Application Security Testing analyses source code for SQL injection, XSS, code smells, and technical debt. Pipeline hard-fails if Quality Gate is not GREEN. SARIF report uploaded to GitHub Security tab."},
  {c:"#6741D9",t:"04b — OWASP Dependency Check",d:"SCA scans all npm and Maven libraries against NVD CVE database. Generates CycloneDX SBOM every build. Pipeline fails on any CVSS ≥ 7.0 (High or Critical) finding. Suppression file required for documented false positives."},
  {c:"#6741D9",t:"04c — GitLeaks Secret Scanning",d:"Scans entire git history and current diff for API keys, tokens, passwords, AWS credentials and private keys. Zero-tolerance policy — any secret found fails the build immediately with the offending commit flagged."},
  {c:"#C92A2A",t:"05 — Pre-Production Security Gate",d:"Central decision point aggregating all scan results. ALL four conditions must be true: Sonar Quality Gate GREEN, zero Critical CVEs, zero secrets detected, OWASP risk threshold met. Any failure triggers auto-Jira ticket + Slack #security-alerts notification and loops back to Jenkins for fix."},
  {c:"#2B8A3E",t:"06 — Docker Build Stage",d:"Multi-stage Dockerfile builds the app in a build container and copies only the production artefact to a minimal distroless base image. BuildKit cache speeds repeated builds. .dockerignore prevents dev files and .env from entering the image."},
  {c:"#6741D9",t:"07 — Trivy Image Scan",d:"Trivy scans the final Docker image for OS package CVEs, app-layer vulnerabilities, exposed secrets and misconfigurations. Fails on CRITICAL severity. Uses --ignore-unfixed to filter unpatched vulns. JSON report saved as build artefact."},
  {c:"#C92A2A",t:"08 — Image Signing (Cosign)",d:"Cosign signs the image digest using keyless OIDC signing via Jenkins OIDC token. Signature stored in OCI registry alongside the image. Kubernetes admission webhook (Kyverno) rejects any unsigned image at deploy time."},
  {c:"#E67700",t:"09 — Nexus Artifact Repository",d:"Private artefact store holds approved Docker images, Maven JARs and npm packages. Immutable image tags (SHA256 digest) prevent tag mutation. IAM least-privilege restricts push to CI service account only. 90-day retention policy auto-cleans old images."},
  {c:"#326CE5",t:"10 — Kubernetes Cluster",d:"EKS (or self-hosted K8s) runs the Netflix clone. Helm chart packages the app with environment-specific values. ArgoCD GitOps engine reconciles desired state from Git to cluster. Blue/Green and Canary rollout strategies with auto-rollback on error rate > 1% or p99 latency > 500ms."},
  {c:"#C92A2A",t:"11 — Kubernetes Security Layer",d:"Multi-layer runtime security: Kyverno policies enforce image signing and registry allowlist. OPA Gatekeeper validates resource requests/limits. NetworkPolicies restrict pod-to-pod traffic to least-privilege. Pod Security Standards (Restricted profile) prevent privileged containers. RBAC limits who can exec into pods."},
  {c:"#0B7285",t:"12 — Monitoring & Alerting",d:"Prometheus scrapes metrics every 15s. Grafana dashboards show SLOs, security posture (CVE counts, policy violations, auth failure rates). Loki aggregates all container and K8s audit logs. AlertManager routes P1 security incidents to PagerDuty and general alerts to Slack #devsecops-alerts."},
];
function show(i){
  const n=D[i];
  document.getElementById('ddot').style.background=n.c;
  document.getElementById('dtitle').textContent=n.t;
  document.getElementById('ddesc').textContent=n.d;
}
</script>
